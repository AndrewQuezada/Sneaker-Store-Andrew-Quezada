<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sneaker Store</title>
    <style>
        body{
            background-color: #f4f6f8;
            padding: 0;
            margin: 0;
        }

        header{
            background-color: #1f2937;
            color: white;
            padding: 20px;
            font-size: 18px;
            text-align: center;
        }

        #cart-info{
            margin-top: 10px;
            font-size: 18px;
            margin-top: 10px;
        }

        #product-container{
            display: flex ;
            flex-wrap: wrap;
            gap: 200px;
            justify-content: center;
            padding: 30px;
            border-radius: 12px;
            background-color: white;
        }

    </style>
</head>
<body>
    <header>
    <h1>My Sneaker Store</h1>
    <p id="cart-info"></p>
    </header>
    <div id="product-container"></div>

    <script>
        const products = [
  {
    id: 1,
    name: "Classic White Sneakers",
    price: 79.99,
    category: "Casual",
    image: "shoes.jfif"
  },
  {
    id: 2,
    name: "Running Pro Trainers",
    price: 120.00,
    category: "Sports",
    image: "shoes.jfif"
  },
  {
    id: 3,
    name: "Urban Graphic Hoodie",
    price: 55.50,
    category: "Streetwear",
    image: "shoes.jfif"
  }
];

let cartCount = 0;

let productContainer = document.getElementById("product-container");

let cartInfo = document.getElementById("cart-info");

function updateCart() {
  cartInfo.textContent = "Cart Items: " + cartCount;
}
function addToCart() {
  cartCount++;
  updateCart();
  console.log(cartCount)
}

function displayProducts() {
    for (let i = 0; i < products.length; i++) {
      let card = document.createElement("div");
      card.className = 'product-card';

      let image = document.createElement("img");
      image.src = products[i].image;
      image.alt = products[i].name;

      let title = document.createElement("h2");
      title.textContent = products[i].name; 

      let price = document.createElement("p");
      price.textContent = "Price: $" + products[i].price; 

      let category = document.createElement("p");
      category.textContent = "Category: " + products[i].category; 

      let button = document.createElement("button");
      button.textContent = "Add to Cart";
      button.onclick = addToCart;

      card.appendChild(image);
      card.appendChild(title);
      card.appendChild(price);
      card.appendChild(category);
      card.appendChild(button);

      productContainer.appendChild(card);
    }
}

displayProducts();
    </script>
</body>
</html>
